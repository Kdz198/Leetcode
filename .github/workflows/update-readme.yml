name: Auto Update README

on:
  push:
    branches:
      - master
    paths:
      - 'src/**/*.java'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Update Script
        run: python update_readme.py # Chạy file script để quét thư mục

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update LeetCode stats and tables 🤖"
          file_pattern: README.md